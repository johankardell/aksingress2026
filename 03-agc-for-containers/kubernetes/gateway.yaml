apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agc-demo-gateway
  namespace: default
  labels:
    demo: agc-containers
  annotations:
    alb.networking.azure.io/alb-namespace: alb-infra
    alb.networking.azure.io/alb-name: alb
spec:
  gatewayClassName: azure-alb-external
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
