apiVersion: apps/v1
kind: Deployment
metadata:
  name: agc-demo-app
  namespace: demo
  labels:
    app: agc-demo-app
    demo: agc-containers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agc-demo-app
  template:
    metadata:
      labels:
        app: agc-demo-app
        demo: agc-containers
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: app
        image: ${ACR_LOGIN_SERVER}/aks-ingress-demo:${IMAGE_TAG}
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: DEMO_NAME
          value: "AGC Demo"
        - name: DEMO_TYPE
          value: "Azure AGC"
        - name: APP_VERSION
          value: "1.0.0"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
