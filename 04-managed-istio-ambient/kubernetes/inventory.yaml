apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory
  namespace: mesh-demo
  labels:
    app: inventory
    service: inventory
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory
  template:
    metadata:
      labels:
        app: inventory
        service: inventory
    spec:
      containers:
      - name: inventory
        image: ${ACR_LOGIN_SERVER}/aks-ingress-demo:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SERVICE_NAME
          value: inventory
        - name: DEMO_NAME
          value: Managed Istio Ambient Mesh - Inventory
        - name: DEMO_TYPE
          value: Internal mesh service
        - name: APP_VERSION
          value: v1
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: inventory
  namespace: mesh-demo
  labels:
    app: inventory
    service: inventory
spec:
  type: ClusterIP
  selector:
    app: inventory
  ports:
  - name: http
    port: 80
    targetPort: 8080
