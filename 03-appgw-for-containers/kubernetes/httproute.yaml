apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: appgw-demo-route
  namespace: default
  labels:
    demo: appgw-containers
spec:
  parentRefs:
  - name: appgw-demo-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: appgw-demo-service
      port: 80
