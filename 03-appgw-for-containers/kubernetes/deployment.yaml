apiVersion: apps/v1
kind: Deployment
metadata:
  name: appgw-demo-app
  namespace: default
  labels:
    app: appgw-demo-app
    demo: appgw-containers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appgw-demo-app
  template:
    metadata:
      labels:
        app: appgw-demo-app
        demo: appgw-containers
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: app
        image: ${ACR_LOGIN_SERVER}/aks-ingress-demo:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 10001
          runAsGroup: 10001
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: DEMO_NAME
          value: "Application Gateway for Containers Demo"
        - name: DEMO_TYPE
          value: "Azure Application Gateway for Containers"
        - name: APP_VERSION
          value: "1.0.0"
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
